<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Drop — Theatrical Releases</title>
<!-- Helvetica World / Helvetica Neue stack — no external font needed -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f1ec;
  --bg2:#ede9e2;
  --bg3:#e5e0d7;
  --card:#faf8f5;
  --border:#d8d2c8;
  --border2:#c8c2b6;
  --text:#1a1814;
  --muted:#8a8278;
  --accent:#c4603a;
  --accent2:#1a1814;
  --green:#2d6a4f;
  --gold:#b5860d;
  --purple:#5a4a8a;
  --radius:4px;
}
body.dark{
  --bg:#0f0e0c;
  --bg2:#181612;
  --bg3:#201e19;
  --card:#141210;
  --border:#2e2b25;
  --border2:#3a3830;
  --text:#f0ece4;
  --muted:#7a7568;
  --accent:#d4704a;
  --accent2:#f0ece4;
  --green:#4aad7a;
  --gold:#d4a030;
  --purple:#8a7ac8;
}
body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:inherit;text-decoration:none}

/* HEADER */
.site-header{display:flex;align-items:flex-end;justify-content:space-between;padding:2.5rem 2.5rem 1.5rem;border-bottom:2px solid var(--text)}
.logo-area{}
.logo{font-family:'Helvetica World','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:48px;font-weight:700;letter-spacing:-2px;line-height:1;color:var(--text)}
.logo-sub{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:4px;font-weight:400}
.header-right{display:flex;align-items:center;gap:10px}
.settings-btn{background:none;border:1.5px solid var(--border2);color:var(--muted);padding:7px 14px;border-radius:var(--radius);font-size:12px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;letter-spacing:.03em}
.settings-btn:hover{border-color:var(--text);color:var(--text)}
.settings-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-load{background:var(--accent);color:#fff;border:none;padding:8px 18px;border-radius:var(--radius);font-size:12px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;cursor:pointer;font-weight:500;letter-spacing:.04em;transition:opacity .15s}
.btn-load:hover{opacity:.88}
.btn-load:disabled{opacity:.5;cursor:not-allowed}

progress{height:2px;width:100%;accent-color:var(--accent);border:none;display:block}
#progressWrap{padding:0 2.5rem;display:none}

/* TOOLBAR */
.toolbar{display:none;align-items:center;gap:6px;padding:.75rem 2.5rem;border-bottom:1.5px solid var(--border);flex-wrap:wrap}
.toolbar.visible{display:flex}
.header-search{background:var(--bg2);border:1.5px solid var(--border);color:var(--text);padding:7px 14px;border-radius:var(--radius);font-size:12px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;outline:none;width:220px;transition:border-color .15s}
.header-search:focus{border-color:var(--accent)}
.header-search::placeholder{color:var(--muted)}
.expand-btns{display:flex;gap:6px}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:var(--radius);font-size:11px;letter-spacing:.04em;cursor:pointer;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;text-transform:uppercase;transition:all .15s}
.btn-ghost:hover{border-color:var(--text);color:var(--text)}

/* CONTENT */
.content{padding:0}

/* YEAR */
.year-block{border-bottom:2px solid var(--text)}
.year-header{display:flex;align-items:baseline;gap:16px;padding:1.25rem 2.5rem;cursor:pointer;user-select:none;transition:background .1s}
.year-header:hover{background:var(--bg2)}
.year-name{font-family:'Helvetica World','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:32px;font-weight:700;letter-spacing:-1px;color:var(--text);line-height:1}
.year-count{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:500}
.year-toggle{margin-left:auto;font-size:16px;color:var(--muted);transition:transform .2s}
.year-toggle.open{transform:rotate(180deg)}
.year-body{display:none}
.year-body.open{display:block}

/* MONTH */
.month-block{border-top:1px solid var(--border2)}
.month-header{display:flex;align-items:baseline;gap:12px;padding:.9rem 2.5rem .9rem 3.5rem;cursor:pointer;user-select:none;transition:background .1s}
.month-header:hover{background:var(--bg2)}
.month-name{font-size:13px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text);font-weight:600}
.month-count{font-size:11px;color:var(--muted)}
.month-toggle{margin-left:auto;font-size:13px;color:var(--muted);transition:transform .2s}
.month-toggle.open{transform:rotate(180deg)}
.month-body{display:none;padding-left:3.5rem}
.month-body.open{display:block}

/* WEEK */
.week-block{border-top:1px solid var(--border)}
.week-header{display:flex;align-items:center;gap:10px;padding:.6rem 2.5rem .6rem 0;cursor:pointer;user-select:none}
.week-header:hover .week-dates{color:var(--accent)}
.week-dates{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);transition:color .1s;font-weight:500}
.week-rule{flex:1;height:1px;background:var(--border)}
.week-count{font-size:10px;color:var(--muted);white-space:nowrap}
.week-toggle{font-size:12px;color:var(--muted);transition:transform .2s;margin-left:4px}
.week-toggle.open{transform:rotate(180deg)}
.week-body{display:none;padding-bottom:8px}
.week-body.open{display:block}

/* MOVIE CARD — poster-inspired */
.movie-card{display:grid;grid-template-columns:52px 1fr;gap:0;border-top:1px solid var(--border);background:var(--card);margin-bottom:1px;transition:background .1s}
.movie-card:hover{background:var(--bg2)}
.movie-poster-col{width:52px;padding:10px 0 10px 0}
.movie-poster-wrap{width:44px;height:66px;border-radius:2px;overflow:hidden;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto}
.movie-poster-img{width:100%;height:100%;object-fit:cover;display:block;filter:grayscale(15%)}
.no-poster{font-size:18px;color:var(--muted)}
.movie-main{padding:10px 2.5rem 10px 12px;display:flex;flex-direction:column;gap:3px}
.movie-top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.movie-title{font-family:'Helvetica World','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:17px;font-weight:600;letter-spacing:-.3px;color:var(--text);line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:420px}
.badge{padding:2px 7px;border-radius:2px;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;align-self:center}
.badge-wide{background:rgba(45,106,79,.1);color:var(--green);border:1px solid rgba(45,106,79,.25)}
.badge-limited{background:rgba(181,134,13,.1);color:var(--gold);border:1px solid rgba(181,134,13,.25)}
.badge-premiere{background:rgba(90,74,138,.1);color:var(--purple);border:1px solid rgba(90,74,138,.25)}
.badge-theatrical{background:rgba(45,106,79,.1);color:var(--green);border:1px solid rgba(45,106,79,.25)}
.badge-streaming{background:rgba(93,134,232,.1);color:#5d86e8;border:1px solid rgba(93,134,232,.25)}
.badge-digital{background:rgba(181,134,13,.1);color:var(--gold);border:1px solid rgba(181,134,13,.25)}
.badge-physical{background:rgba(90,74,138,.1);color:var(--purple);border:1px solid rgba(90,74,138,.25)}
.movie-date-inline{font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap}
.movie-credits{font-size:11px;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap;margin-top:1px}
.movie-credits span{display:flex;align-items:center;gap:4px}
.credit-label{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--border2)}
.credit-val{color:var(--muted)}
.movie-links{display:flex;gap:5px;margin-top:4px}
.movie-link{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);padding:3px 9px;border-radius:2px;transition:all .12s;display:inline-flex;align-items:center;gap:4px}
.movie-link:hover{color:var(--text);border-color:var(--text);background:var(--bg3)}

/* STATES */
.loading-state{text-align:center;padding:5rem 2rem;color:var(--muted)}
.loading-ring{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-label{font-size:12px;letter-spacing:.1em;text-transform:uppercase}
.empty-state{text-align:center;padding:5rem 2rem;color:var(--muted);font-size:13px}
.welcome-state{padding:3rem 2.5rem;border-bottom:1px solid var(--border)}
.welcome-hed{font-family:'Helvetica World','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:26px;font-weight:700;letter-spacing:-.5px;color:var(--muted);margin-bottom:.5rem}
.welcome-body{font-size:13px;color:var(--muted);line-height:1.7;max-width:480px}
.welcome-body a{color:var(--accent);text-decoration:underline}

/* ── MOBILE RESPONSIVE ── */
@media(max-width:680px){
  .site-header{padding:1.25rem 1rem 1rem;flex-wrap:wrap;gap:.75rem;align-items:flex-start}
  .logo{font-size:36px;letter-spacing:-1.5px}
  .logo-sub{font-size:10px}
  .header-right{width:100%;display:flex;gap:8px;align-items:center}
  .header-search{flex:1;width:auto;min-width:0;font-size:13px}
  .settings-btn{padding:7px 10px;font-size:11px}
  .settings-panel{padding:1rem;flex-direction:column;gap:10px}
  .settings-panel input{width:100%}
  .pin-panel{padding:1rem}
  .toolbar{padding:.6rem 1rem;gap:5px}
  .search-wrap{padding:.6rem 1rem}
  .year-header{padding:1rem 1rem}
  .year-name{font-size:26px}
  .month-header{padding:.75rem 1rem .75rem 1.75rem}
  .month-body{padding-left:1.75rem}
  .week-header{padding:.5rem 1rem .5rem 0}
  .movie-card{grid-template-columns:44px 1fr}
  .movie-poster-col{width:44px;padding:8px 0}
  .movie-poster-wrap{width:38px;height:57px}
  .movie-main{padding:8px 1rem 8px 10px}
  .movie-title{font-size:14px;max-width:100%}
  .movie-top{flex-wrap:wrap;gap:6px}
  .movie-date-inline{margin-left:0;width:100%}
  .movie-credits{gap:8px}
  .movie-links{flex-wrap:wrap;gap:4px}
  .movie-link{font-size:10px;padding:4px 8px}
  .welcome-state{padding:1.5rem 1rem}
  .expand-btns{display:none}
  .trailer-overlay{padding:.5rem}
  .trailer-box{max-width:100%}
  .trailer-title{font-size:13px;max-width:calc(100vw - 80px)}
    }
@media(max-width:400px){
  .logo{font-size:30px}
  .movie-card{grid-template-columns:40px 1fr}
  .movie-poster-wrap{width:34px;height:51px}
}

/* TRAILER MODAL */
.trailer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1000;display:none;align-items:center;justify-content:center;padding:2rem}
.trailer-overlay.open{display:flex}
.trailer-box{position:relative;width:100%;max-width:860px;background:#000;border-radius:6px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.7)}
.trailer-ratio{position:relative;padding-bottom:56.25%;height:0}
.trailer-ratio iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.trailer-top{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;background:#111}
.trailer-title{font-family:'Helvetica World','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:16px;font-weight:700;letter-spacing:-.2px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:680px}
.trailer-close{background:none;border:none;color:#888;font-size:22px;cursor:pointer;padding:0 4px;line-height:1;transition:color .15s}
.trailer-close:hover{color:#fff}
.trailer-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#111;font-size:13px;color:#666;letter-spacing:.08em;text-transform:uppercase}
</style>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <header class="site-header">
    <div class="logo-area">
      <div class="logo">The Drop</div>
      <div class="logo-sub">Know what's dropping, everywhere.</div>
    </div>
    <div class="header-right">
      <input class="header-search" type="text" id="searchInput" placeholder="Search titles…" oninput="filterMovies()" />
      <button class="settings-btn" id="darkToggle" onclick="toggleDark()" title="Toggle dark mode">
        <i class="ti ti-moon" id="darkIcon" aria-hidden="true"></i>
      </button>
    </div>
  </header>
  <!-- STATUS -->

  <!-- TOOLBAR -->
  <div class="toolbar" id="toolbar">
    <div class="expand-btns">
      <button class="btn-ghost" onclick="toggleAll(true)">Expand all</button>
      <button class="btn-ghost" onclick="toggleAll(false)">Collapse all</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content">
    <div class="loading-state"><div class="loading-ring"></div><div class="loading-label">Loading releases…</div></div>
  </div>

</div>

<!-- TRAILER MODAL -->
<div class="trailer-overlay" id="trailerOverlay" onclick="closeTrailer(event)">
  <div class="trailer-box" id="trailerBox">
    <div class="trailer-top">
      <span class="trailer-title" id="trailerTitle"></span>
      <button class="trailer-close" onclick="closeTrailerDirect()" aria-label="Close trailer"><i class="ti ti-x"></i></button>
    </div>
    <div class="trailer-ratio">
      <div class="trailer-loading" id="trailerLoading">Finding trailer…</div>
      <iframe id="trailerFrame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
  </div>
</div>

<script>
let allMovies = [];
let searchTerm = '';


function toggleDark() {
  const dark = document.body.classList.toggle('dark');
  localStorage.setItem('thedrop_dark', dark ? '1' : '0');
  document.getElementById('darkIcon').className = dark ? 'ti ti-sun' : 'ti ti-moon';
}

// Apply saved dark mode on load
(function(){
  if (localStorage.getItem('thedrop_dark') === '1') {
    document.body.classList.add('dark');
    document.addEventListener('DOMContentLoaded', () => {
      const icon = document.getElementById('darkIcon');
      if (icon) icon.className = 'ti ti-sun';
    });
  }
})();

// Auto-load on page open
window.addEventListener('load', () => loadMovies());




function setStatus(msg, type) {}

function setProgress(val, max) {}
  wrap.style.display = 'block';
  bar.max = max; bar.value = val;
}

async function loadMovies() {
  document.getElementById('content').innerHTML = '<div class="loading-state"><div class="loading-ring"></div><div class="loading-label">Loading releases…</div></div>';
  document.getElementById('toolbar').classList.remove('visible');
  try {
    const movies = await fetchAll();
    allMovies = movies;
    if (!movies || movies.length === 0) {
      document.getElementById('content').innerHTML = '<div class="empty-state" style="padding:4rem 2.5rem"><div style="font-family:Helvetica Neue,Helvetica,Arial,sans-serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:.75rem">Coming soon</div><div style="font-size:13px;color:var(--muted);line-height:1.7">The movie calendar is being built.<br>Check back shortly — it updates automatically every night.</div></div>';
      return;
    }
    document.getElementById('toolbar').classList.add('visible');
    renderMovies();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty-state">Could not load movies.<br><small style="color:var(--muted)">' + e.message + '</small></div>';
  }
}

async function fetchAll() {
  // Fetch pre-built movies.json generated nightly by GitHub Action
  const res = await fetch('movies.json');
  if (!res.ok) throw new Error('Could not load movies.json (HTTP ' + res.status + ')');
  const data = await res.json();
  // data has { generatedAt, count, movies[] }
  const movies = data.movies || data;
  return movies;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function getWeek(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay();
  const diff = (day + 3) % 7;
  const thu = new Date(d); thu.setDate(d.getDate() - diff);
  const wed = new Date(thu); wed.setDate(thu.getDate() + 6);
  return {thu, wed};
}

function fmtWeekHeader(thu, wed) {
  const fmtD = d => DAYS_SHORT[d.getDay()] + ' ' + MONTHS_SHORT[d.getMonth()] + ' ' + d.getDate();
  return fmtD(thu) + ' – ' + fmtD(wed);
}

function fmtRelease(str) {
  const d = new Date(str + 'T12:00:00');
  return MONTHS_SHORT[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

function groupMovies(movies) {
  const filtered = movies.filter(m => {
    return !searchTerm || m.title.toLowerCase().includes(searchTerm.toLowerCase());
  });
  const tree = {};
  for (const m of filtered) {
    if (!m.releaseDate) continue;
    const d = new Date(m.releaseDate + 'T12:00:00');
    const yr = d.getFullYear(), mo = d.getMonth();
    const {thu, wed} = getWeek(m.releaseDate);
    const wk = thu.toISOString().split('T')[0];
    const wkLabel = fmtWeekHeader(thu, wed);
    if (!tree[yr]) tree[yr] = {};
    if (!tree[yr][mo]) tree[yr][mo] = {};
    if (!tree[yr][mo][wk]) tree[yr][mo][wk] = {label: wkLabel, movies: []};
    tree[yr][mo][wk].movies.push(m);
  }
  return tree;
}

function renderMovies() {
  const tree = groupMovies(allMovies);
  const now = new Date();
  const curYr = now.getFullYear(), curMo = now.getMonth();
  const years = Object.keys(tree).sort();
  if (!years.length) {
    document.getElementById('content').innerHTML = '<div class="empty-state">No movies match the current filter.</div>';
    return;
  }

  let html = '';
  for (const yr of years) {
    const yrN = parseInt(yr);
    const isCurYr = yrN === curYr;
    const totalYr = Object.values(tree[yr]).reduce((s,mo)=>s+Object.values(mo).reduce((ss,wk)=>ss+wk.movies.length,0),0);
    html += `<div class="year-block">
      <div class="year-header" onclick="tog('Y${yr}')">
        <span class="year-name">${yr}</span>
        <span class="year-count">${totalYr} film${totalYr!==1?'s':''}</span>
        <i class="ti ti-chevron-down year-toggle ${isCurYr?'open':''}" id="chY${yr}" aria-hidden="true"></i>
      </div>
      <div class="year-body ${isCurYr?'open':''}" id="Y${yr}">`;

    for (const mo of Object.keys(tree[yr]).sort((a,b)=>a-b)) {
      const moN = parseInt(mo);
      const isCurMo = isCurYr && moN === curMo;
      const totalMo = Object.values(tree[yr][mo]).reduce((s,wk)=>s+wk.movies.length,0);
      html += `<div class="month-block">
        <div class="month-header" onclick="tog('M${yr}_${mo}')">
          <span class="month-name">${MONTHS[moN]}</span>
          <span class="month-count">${totalMo} film${totalMo!==1?'s':''}</span>
          <i class="ti ti-chevron-down month-toggle ${isCurMo?'open':''}" id="chM${yr}_${mo}" aria-hidden="true"></i>
        </div>
        <div class="month-body ${isCurMo?'open':''}" id="M${yr}_${mo}">`;

      for (const wk of Object.keys(tree[yr][mo]).sort()) {
        const wkData = tree[yr][mo][wk];
        const wkId = 'W' + wk.replace(/-/g,'');
        html += `<div class="week-block">
          <div class="week-header" onclick="tog('${wkId}')">
            <span class="week-dates">${wkData.label}</span>
            <span class="week-rule"></span>
            <span class="week-count">${wkData.movies.length} film${wkData.movies.length!==1?'s':''}</span>
            <i class="ti ti-chevron-down week-toggle open" id="ch${wkId}" aria-hidden="true"></i>
          </div>
          <div class="week-body open" id="${wkId}">`;

        for (const m of wkData.movies) {
          const fmt = m.format || 'theatrical';
          const bc = fmt==='theatrical'?'badge-wide':fmt==='streaming'?'badge-streaming':fmt==='digital'?'badge-digital':fmt==='physical'?'badge-physical':'badge-limited';
          const bl = fmt.charAt(0).toUpperCase()+fmt.slice(1);
          const lbUrl = 'https://letterboxd.com/search/'+encodeURIComponent(m.title)+'/';
          const imdbUrl = 'https://www.imdb.com/find/?q='+encodeURIComponent(m.title);
          const tmdbUrl = 'https://www.themoviedb.org/movie/'+m.id;
          const dirHTML = m.directorStr ? `<span><span class="credit-label">Dir.</span> <span class="credit-val">${m.directorStr}</span></span>` : '';
          const stuHTML = m.studioStr ? `<span><span class="credit-label">Studio</span> <span class="credit-val">${m.studioStr}</span></span>` : '';

          html += `<div class="movie-card">
            <div class="movie-poster-col">
              <div class="movie-poster-wrap">
                ${m.poster
                  ? `<img class="movie-poster-img" src="${m.poster}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<i class=\\'ti ti-movie no-poster\\' aria-hidden=\\'true\\'></i>'">`
                  : `<i class="ti ti-movie no-poster" aria-hidden="true"></i>`}
              </div>
            </div>
            <div class="movie-main">
              <div class="movie-top">
                <span class="movie-title" title="${m.title.replace(/"/g,'')}">${m.title}</span>
                <span class="badge ${bc}">${bl}</span>
                <span class="movie-date-inline">${fmtRelease(m.releaseDate)}</span>
              </div>
              ${(dirHTML||stuHTML) ? `<div class="movie-credits">${dirHTML}${stuHTML}</div>` : ''}
              <div class="movie-links">
                <a class="movie-link" href="${lbUrl}" target="_blank" rel="noopener"><i class="ti ti-movie" aria-hidden="true"></i>Letterboxd</a>
                <a class="movie-link" href="${imdbUrl}" target="_blank" rel="noopener"><i class="ti ti-star" aria-hidden="true"></i>IMDb</a>
                <button class="movie-link trailer-btn" onclick="openTrailer(${m.id}, \`${m.title.replace(/`/g,"'")}\`)" style="cursor:pointer;background:none"><i class="ti ti-player-play" aria-hidden="true"></i>Trailer</button>
              </div>
            </div>
          </div>`;
        }
        html += `</div></div>`;
      }
      html += `</div></div>`;
    }
    html += `</div></div>`;
  }
  document.getElementById('content').innerHTML = html;
}

function tog(id) {
  const body = document.getElementById(id);
  const chev = document.getElementById('ch'+id);
  if (!body) return;
  const open = body.classList.toggle('open');
  if (chev) chev.classList.toggle('open', open);
}

function toggleAll(open) {
  document.querySelectorAll('.year-body,.month-body,.week-body').forEach(el=>el.classList.toggle('open',open));
  document.querySelectorAll('.year-toggle,.month-toggle,.week-toggle').forEach(el=>el.classList.toggle('open',open));
}

// TRAILER PLAYER
const trailerCache = {};

async function openTrailer(movieId, title) {
  const overlay = document.getElementById('trailerOverlay');
  const frame = document.getElementById('trailerFrame');
  const titleEl = document.getElementById('trailerTitle');
  const loading = document.getElementById('trailerLoading');

  titleEl.textContent = title;
  frame.src = '';
  loading.style.display = 'flex';
  loading.textContent = 'Finding trailer…';
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  try {
    let videoKey = trailerCache[movieId];
    if (!videoKey) {
      const apiKey = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI4ODM0ZjgxNjE4ZjEyMjE2NzdkMWFlMmJjYzhmYWZlOSIsIm5iZiI6MTc3OTY3OTk3MC4zNTM5OTk5LCJzdWIiOiI2YTEzYzJlMjQwN2FkZWFjYzNkYjYwYTUiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.vs6dCrFpQtDBN4on6mR9GGqLI3sOebu3WfteSS-lFA8';
      const url = `https://api.themoviedb.org/3/movie/${movieId}/videos`;
      const res = await fetch(url, {headers:{'Authorization':'Bearer '+apiKey}});
      const data = await res.json();
      const videos = data.results || [];

      // Priority: Official Trailer > Trailer > Teaser > Clip — highest quality (HD preferred)
      const priority = ['Official Trailer','Trailer','Teaser','Clip','Featurette'];
      let best = null;
      for (const type of priority) {
        const matches = videos.filter(v => v.site === 'YouTube' && v.type === type);
        if (matches.length) {
          // prefer HD (1080 or 720), then latest
          best = matches.sort((a,b) => {
            const qa = a.official ? 1 : 0, qb = b.official ? 1 : 0;
            if (qa !== qb) return qb - qa;
            return new Date(b.published_at||0) - new Date(a.published_at||0);
          })[0];
          break;
        }
      }
      videoKey = best ? best.key : null;
      trailerCache[movieId] = videoKey;
    }

    if (videoKey) {
      loading.style.display = 'none';
      frame.src = `https://www.youtube.com/embed/${videoKey}?autoplay=1&rel=0&modestbranding=1`;
    } else {
      loading.textContent = 'No trailer available yet.';
    }
  } catch(e) {
    loading.textContent = 'Could not load trailer.';
  }
}

function closeTrailerDirect() {
  const overlay = document.getElementById('trailerOverlay');
  const frame = document.getElementById('trailerFrame');
  overlay.classList.remove('open');
  frame.src = '';
  document.body.style.overflow = '';
}

function closeTrailer(e) {
  if (e.target === document.getElementById('trailerOverlay')) closeTrailerDirect();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTrailerDirect(); });
